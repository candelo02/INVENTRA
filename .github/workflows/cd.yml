name: CD — Deploy Inventra (Render)

on:
  workflow_run:
    workflows: ['CI — Inventra Full-Stack']
    types: [completed]
    branches: [main]

jobs:
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy Backend a Render
        env:
          HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          curl -s -X POST "$HOOK" \
            -H "Content-Type: application/json" \
            --fail
      - name: Confirmar deploy backend
        run: echo "Backend desplegado en Render"

  deploy-frontend:
    name: Deploy Frontend → Render
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy Frontend a Render
        env:
          HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          curl -s -X POST "$HOOK" \
            -H "Content-Type: application/json" \
            --fail
      - name: Confirmar deploy frontend
        run: echo "Frontend desplegado en Render"
