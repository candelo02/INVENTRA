name: CI — Inventra Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout del código fuente
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js 24
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # 3. Instalación limpia de dependencias de desarrollo
      - name: Instalar dependencias
        run: npm ci

      # 4. Validación estática ESLint (si falla, el pipeline se detiene)
      - name: ESLint — validación de código
        run: npm run lint

      # 5. Tests unitarios e integración con cobertura
      - name: Jest — pruebas con cobertura
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_ci
          MONGO_URI: mongodb://localhost:27017/inventra_test

      # 6. Publicar reporte de cobertura (artefacto descargable)
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7
