version: '3.9'

services:
  # ── Base de datos MongoDB ───────────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: inventra_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - inventra_net

  # ── Backend API (Node.js + Express) ─────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventra_backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASS}@mongo:27017/${MONGO_DB}?authSource=admin
      FRONTEND_URL: http://localhost
    ports:
      - '5000:5000'
    depends_on:
      - mongo
    networks:
      - inventra_net

  # ── Frontend (React + Vite → Nginx) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inventra_frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - inventra_net

volumes:
  mongo_data:

networks:
  inventra_net:
    driver: bridge
